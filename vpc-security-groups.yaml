AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production VPC with public/private subnets across 2 AZs,
  Internet Gateway, NAT Gateway, Route Tables, and Security Groups
  for the WordPress HA project (ganeshc.shop).

# ──────────────────────────────────────────────
# PARAMETERS
# ──────────────────────────────────────────────
Parameters:
  EnvironmentName:
    Type: String
    Default: prod
    Description: Prefix applied to every resource name.

  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the custom VPC.

  PublicSubnet1CIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: Public subnet in AZ-1 (ALB + NAT Gateway).

  PublicSubnet2CIDR:
    Type: String
    Default: 10.0.2.0/24
    Description: Public subnet in AZ-2 (ALB).

  PrivateSubnet1CIDR:
    Type: String
    Default: 10.0.3.0/24
    Description: Private subnet in AZ-1 (EC2 + RDS).

  PrivateSubnet2CIDR:
    Type: String
    Default: 10.0.4.0/24
    Description: Private subnet in AZ-2 (EC2 + RDS).

# ──────────────────────────────────────────────
# RESOURCES
# ──────────────────────────────────────────────
Resources:

  # ============================================================
  # 1. VPC
  # ============================================================
  ProdVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-vpc"

  # ============================================================
  # 2. INTERNET GATEWAY
  # ============================================================
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-igw"

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref ProdVPC
      InternetGatewayId: !Ref InternetGateway

  # ============================================================
  # 3. SUBNETS
  # ============================================================

  # --- Public Subnets ---
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ProdVPC
      CidrBlock: !Ref PublicSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-public-subnet-1"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ProdVPC
      CidrBlock: !Ref PublicSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-public-subnet-2"

  # --- Private Subnets ---
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ProdVPC
      CidrBlock: !Ref PrivateSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-private-subnet-1"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ProdVPC
      CidrBlock: !Ref PrivateSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-private-subnet-2"

  # ============================================================
  # 4. ELASTIC IP + NAT GATEWAY (in Public Subnet 1)
  # ============================================================
  NatGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-nat-eip"

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-nat-gateway"

  # ============================================================
  # 5. ROUTE TABLES
  # ============================================================

  # --- Public Route Table (→ IGW) ---
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ProdVPC
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-public-rt"

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # --- Private Route Table (→ NAT Gateway) ---
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ProdVPC
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-private-rt"

  DefaultPrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ============================================================
  # 6. SECURITY GROUPS
  # ============================================================

  # --- sg-alb: ALB accepts HTTP(80) and HTTPS(443) from anywhere ---
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${EnvironmentName}-sg-alb"
      GroupDescription: "Allow HTTP and HTTPS from the internet to ALB"
      VpcId: !Ref ProdVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: "HTTP from internet"
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: "HTTPS from internet"
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: "Allow all outbound"
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-sg-alb"

  # --- sg-app: EC2 accepts HTTP(80) from ALB only ---
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${EnvironmentName}-sg-app"
      GroupDescription: "Allow HTTP from ALB to EC2 instances"
      VpcId: !Ref ProdVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: "HTTP from ALB only"
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: "Allow all outbound (yum, EFS, Secrets Manager)"
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-sg-app"

  # --- sg-db: RDS accepts MySQL(3306) from EC2 only ---
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${EnvironmentName}-sg-db"
      GroupDescription: "Allow MySQL from EC2 app tier only"
      VpcId: !Ref ProdVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref AppSecurityGroup
          Description: "MySQL from EC2 app tier only"
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: "Allow all outbound"
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-sg-db"

# ──────────────────────────────────────────────
# OUTPUTS  (reference these in other stacks)
# ──────────────────────────────────────────────
Outputs:

  VpcId:
    Description: VPC ID
    Value: !Ref ProdVPC
    Export:
      Name: !Sub "${EnvironmentName}-VpcId"

  PublicSubnet1Id:
    Description: Public Subnet 1 (AZ-1)
    Value: !Ref PublicSubnet1
    Export:
      Name: !Sub "${EnvironmentName}-PublicSubnet1Id"

  PublicSubnet2Id:
    Description: Public Subnet 2 (AZ-2)
    Value: !Ref PublicSubnet2
    Export:
      Name: !Sub "${EnvironmentName}-PublicSubnet2Id"

  PrivateSubnet1Id:
    Description: Private Subnet 1 (AZ-1)
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub "${EnvironmentName}-PrivateSubnet1Id"

  PrivateSubnet2Id:
    Description: Private Subnet 2 (AZ-2)
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub "${EnvironmentName}-PrivateSubnet2Id"

  ALBSecurityGroupId:
    Description: Security Group ID for ALB
    Value: !Ref ALBSecurityGroup
    Export:
      Name: !Sub "${EnvironmentName}-ALBSecurityGroupId"

  AppSecurityGroupId:
    Description: Security Group ID for EC2
    Value: !Ref AppSecurityGroup
    Export:
      Name: !Sub "${EnvironmentName}-AppSecurityGroupId"

  DBSecurityGroupId:
    Description: Security Group ID for RDS
    Value: !Ref DBSecurityGroup
    Export:
      Name: !Sub "${EnvironmentName}-DBSecurityGroupId"
